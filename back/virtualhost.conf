<VirtualHost *:80>

  DocumentRoot /var/www/html/api
  <Directory /var/www/html/api>
    Order allow,deny
    Allow from all

    Options -MultiViews

    RewriteEngine On

    RewriteBase /

    # Não redireciona se for arquivo ou diretório real
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d

    # Manda tudo para o index.php
    RewriteRule ^ index.php [QSA,L]
  </Directory>

  ErrorLog /var/log/apache2/error.log
  LogLevel warn

</VirtualHost>